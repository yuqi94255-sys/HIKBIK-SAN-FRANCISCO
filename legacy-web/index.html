<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HikBik - Explore America's Parks</title>
  
  <!-- ⚠️ 核选项：在所有脚本之前完全静默 Figma 错误 -->
  <script>
    (function() {
      'use strict';
      
      // 保存原始console方法的引用
      const _originalError = console.error;
      const _originalWarn = console.warn;
      const _originalLog = console.log;
      
      // 检查是否为 Figma 相关错误
      function isFigmaRelated(args) {
        const str = Array.from(args).map(a => String(a)).join(' ');
        return (
          str.includes('devtools_worker') ||
          str.includes('webpack-artifacts') ||
          str.includes('figma.com') ||
          str.includes('readFromStdout') ||
          str.includes('.br:') ||
          str.includes('webpack://') ||
          str.includes('figma')
        );
      }
      
      // 完全覆盖 console.error
      console.error = function(...args) {
        if (isFigmaRelated(args)) return;
        _originalError.apply(console, args);
      };
      
      // 完全覆盖 console.warn
      console.warn = function(...args) {
        if (isFigmaRelated(args)) return;
        _originalWarn.apply(console, args);
      };
      
      // 可选：也过滤 console.log
      console.log = function(...args) {
        if (isFigmaRelated(args)) return;
        _originalLog.apply(console, args);
      };
      
      // 拦截所有window错误事件
      window.addEventListener('error', function(event) {
        if (event.filename && (
          event.filename.includes('devtools_worker') ||
          event.filename.includes('figma.com') ||
          event.filename.includes('webpack-artifacts')
        )) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          return false;
        }
      }, true);
      
      // 拦截未处理的Promise rejections
      window.addEventListener('unhandledrejection', function(event) {
        const reason = String(event.reason || '');
        const stack = (event.reason && event.reason.stack) || '';
        
        if (
          reason.includes('devtools_worker') ||
          reason.includes('figma.com') ||
          stack.includes('devtools_worker') ||
          stack.includes('figma.com') ||
          stack.includes('webpack-artifacts')
        ) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          return false;
        }
      }, true);
      
      // 拦截已处理的rejections
      window.addEventListener('rejectionhandled', function(event) {
        const reason = String(event.reason || '');
        if (reason.includes('devtools_worker') || reason.includes('figma.com')) {
          event.preventDefault();
          return false;
        }
      }, true);
      
      console.log('%c🛡️ Figma 错误过滤器已激活', 'color: #10b981; font-weight: bold; font-size: 14px;');
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
